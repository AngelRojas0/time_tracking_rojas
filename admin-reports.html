<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Reports | Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard-page" style="display: flex;">
    <aside class="dashboard-sidebar">
        <h2>⏱ Admin Panel</h2>
        <nav>
            <button class="nav-btn" onclick="location.href='admin-dashboard.html'">Dashboard</button>
            <button class="nav-btn" onclick="location.href='admin-logs.html'">All Logs</button>
            <button class="nav-btn active">System Reports</button>
            <button class="nav-btn" onclick="location.href='admin-settings.html'">Settings</button>
        </nav>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main style="flex: 1; padding: 40px;">
        <h1>Advanced Database Report</h1>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card"><h4>Avg Duration</h4><p id="avgDur">0</p></div>
            <div class="stat-card"><h4>Max Session</h4><p id="maxDur">0</p></div>
            <div class="stat-card"><h4>Min Session</h4><p id="minDur">0</p></div>
            <div class="stat-card"><h4>Total Logs</h4><p id="totalCount">0</p></div>
        </div>

        <div class="dashboard-card">
            <h3>Performance Analysis (Above Average Sessions)</h3>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #eee;">
                        <th>User</th>
                        <th>Task</th>
                        <th>Duration</th>
                        <th>User's Total History</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
function loadAdvancedReports() {
    fetch('get_advanced_reports.php')
        .then(res => res.json())
        .then(data => {
            // Update Aggregation Stats
            document.getElementById('avgDur').innerText = formatTime(data.stats.avg_time);
            document.getElementById('maxDur').innerText = formatTime(data.stats.longest_session);
            document.getElementById('minDur').innerText = formatTime(data.stats.shortest_session);
            document.getElementById('totalCount').innerText = data.stats.total_records;

            // Render Table (JOIN Results)
            const tbody = document.getElementById("reportTableBody");
            tbody.innerHTML = "";
            data.logs.forEach(log => {
                tbody.innerHTML += `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 12px;">${log.username}</td>
                        <td style="padding: 12px;">${log.task_name || 'General'}</td>
                        <td style="padding: 12px;">${formatTime(log.duration_seconds)}</td>
                        <td style="padding: 12px;">${log.user_total_logs} logs</td>
                    </tr>`;
            });
        });
}

function formatTime(s) {
    const sec = parseInt(s) || 0;
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const rs = sec % 60;
    return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${rs.toString().padStart(2,'0')}`;
}

window.onload = loadAdvancedReports;
</script>

<style>
    .stat-card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    .stat-card h4 { margin: 0; color: #7f8c8d; font-size: 0.8rem; }
    .stat-card p { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }
</style>
</body>
</html>
