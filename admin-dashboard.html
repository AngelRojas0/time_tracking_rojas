<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Time Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="dashboard-page" style="display: flex; min-height: 100vh;">
  
  <aside class="dashboard-sidebar">
    <h2>⏱ Admin Panel</h2>
    <nav>
      <button class="nav-btn active" onclick="location.href='admin-dashboard.html'">Dashboard</button>
      <button class="nav-btn" onclick="location.href='admin-logs.html'">All Logs</button>
      <button class="nav-btn" onclick="location.href='admin-reports.html'">System Reports</button>
      <button class="nav-btn" onclick="location.href='admin-settings.html'">Settings</button>
    </nav>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </aside>

  <main id="exportArea" class="dashboard-main" style="flex: 1; padding: 40px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>Dashboard</h1>
        <button id="downloadBtn" onclick="exportToPDF()" style="padding: 10px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            📥 Download PDF Report
        </button>
    </div>
    
    <div class="dashboard-cards" style="display: flex; gap: 20px; margin-bottom: 30px;">
      <div class="dashboard-card" style="flex: 1;">
        <h3>Total Users</h3>
        <div id="totalUsers" class="stat-number" style="font-size: 2.5rem; font-weight: bold; color: #3498db;">0</div>
      </div>
      <div class="dashboard-card" style="flex: 1;">
        <h3>Total Sessions</h3>
        <div id="totalSessions" class="stat-number" style="font-size: 2.5rem; font-weight: bold; color: #2ecc71;">0</div>
      </div>
      <div class="dashboard-card" style="flex: 1;">
        <h3>Total Time Tracked</h3>
        <div id="globalTime" class="stat-number" style="font-size: 2.5rem; font-weight: bold; color: #e67e22;">00:00:00</div>
      </div>
    </div>

    <div style="display: flex; gap: 20px; margin-bottom: 30px; align-items: flex-start;">
    
    <div class="dashboard-card" style="flex: 2; padding: 20px; min-width: 0;">
        <h3>Weekly Session Activity</h3>
        <div style="height: 300px;">
            <canvas id="sessionBarChart"></canvas>
        </div>
    </div>

    <div class="dashboard-card" style="flex: 1; padding: 20px; min-width: 0;">
        <h3>User Management</h3>
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
                <thead>
                    <tr class="table-header-row" style="text-align: left;">
                        <th style="padding: 12px;">Username</th>
                        <th style="padding: 12px;">Status</th>
                        <th style="padding: 12px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="userCRUDList"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
        document.documentElement.classList.add("dark-mode");
        document.body.classList.add("dark-mode");
    }
    loadUsers();
    loadDashboardStats();
    renderWeeklyChart(); // Call the chart function
});

// Logic to render the bar chart
function renderWeeklyChart() {
    fetch('get_weekly_stats.php')
        .then(res => res.json())
        .then(apiData => {
            const ctx = document.getElementById('sessionBarChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: apiData.map(item => item.session_date),
                    datasets: [{
                        label: 'Sessions',
                        data: apiData.map(item => item.count),
                        backgroundColor: '#3498db'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        });
}

// Logic to export dashboard to PDF
async function exportToPDF() {
    const { jsPDF } = window.jspdf;
    const element = document.getElementById("exportArea");
    const btn = document.getElementById("downloadBtn");

    btn.textContent = "Generating PDF...";
    btn.disabled = true;

    try {
        const canvas = await html2canvas(element, {
            scale: 2,
            ignoreElements: (el) => el.id === 'downloadBtn'
        });

        const imgData = canvas.toDataURL("image/png");
        const pdf = new jsPDF({
            orientation: "landscape",
            unit: "px",
            format: [canvas.width, canvas.height]
        });

        pdf.addImage(imgData, "PNG", 0, 0, canvas.width, canvas.height);
        pdf.save(`Admin_Dashboard_Report.pdf`);
    } catch (err) {
        console.error("PDF Export Error:", err);
    } finally {
        btn.textContent = "📥 Download PDF Report";
        btn.disabled = false;
    }
}

function loadDashboardStats() {
  fetch('get_admin_stats.php')
    .then(res => res.json())
    .then(data => {
      document.getElementById("totalUsers").textContent = data.totalUsers;
      document.getElementById("totalSessions").textContent = data.totalSessions;
      document.getElementById("globalTime").textContent = data.totalTime;
    })
    .catch(err => console.error("Stats Error:", err));
}

function loadUsers() {
  fetch('get_users.php')
    .then(res => res.json())
    .then(users => {
      const list = document.getElementById("userCRUDList");
      if (!list) return;
      list.innerHTML = ""; 
      
      users.forEach(user => {
        const uId = parseInt(user.user_id);
        const currentActive = parseInt(user.is_active);
        const statusText = currentActive === 1 ? "Active" : "Inactive";
        const statusColor = currentActive === 1 ? style="#2ecc71" : "color:#e74c3c";

        list.innerHTML += `
          <tr style="border-bottom: 1px solid #eee;">
            <td style="padding: 12px;">${uId}</td>
            <td style="padding: 12px;">${user.username}</td>
            <td style="padding: 12px; color: ${statusColor}; font-weight: bold;">${statusText}</td>
            <td style="padding: 12px;">
              <button onclick="toggleStatus(${uId}, ${currentActive})" style="color:yellow; border:none; background:none; cursor:pointer; font-weight:bold;">Active/Inactive</button> | 
              <button onclick="deleteUser(${uId})" style="color:#e74c3c; border:none; background:none; cursor:pointer; font-weight:bold;">Delete Account</button>
            </td>
          </tr>
        `;
      });
    })
    .catch(err => console.error("Users Load Error:", err));
}

function toggleStatus(userId, currentStatus) {
  const newStatus = parseInt(currentStatus) === 1 ? 0 : 1;
  fetch('update_user.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: userId, is_active: newStatus })
  })
  .then(res => res.json())
  .then(data => {
    if (data.status === 'success') {
      alert("✅ Status updated!");
      loadUsers(); 
    } else {
      alert("❌ " + data.message);
    }
  });
}

function deleteUser(userId) {
  if (confirm("Are you sure?")) {
    fetch('delete_user.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId })
    })
    .then(res => res.json())
    .then(data => {
      if (data.status === 'success') {
        alert("✅ User deleted!");
        loadUsers(); 
        loadDashboardStats(); 
      }
    });
  }
}

function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
}
</script>
</body>
</html>
