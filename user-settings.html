<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Time Tracker</title>
    <link rel="stylesheet" href="style.css"> 
    <script>
        // RUN THIS IMMEDIATELY to prevent the "white flash"
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.documentElement.classList.add("dark-mode");
                document.body.classList.add("dark-mode");
            }
        })();
    </script>
</head>
<body>

<div class="dashboard-page" style="display: flex; width: 100%;">

    <!-- Consistent Sidebar -->
    <aside class="dashboard-sidebar">
        <h2>⏱ Time Tracker</h2>
        <nav>
            <button class="nav-btn" onclick="location.href='user-dashboard.html'">Dashboard</button>
            <button class="nav-btn" onclick="location.href='user-logs.html'">Time Logs</button>
            <button class="nav-btn" onclick="location.href='user-reports.html'">Reports</button>
            <button class="nav-btn active" onclick="location.href='user-settings.html'">Settings</button>
        </nav>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main class="dashboard-main" style="flex: 1; padding: 40px;">
        <h1>Account Settings</h1>
        <p class="subtitle">Manage your profile and display preferences.</p>

        <div class="dashboard-cards" style="display: flex; flex-direction: column; gap: 25px;">
            
            <!-- Appearance / Mode Toggle -->
            <div class="dashboard-card" style="max-width: 600px;">
    <h3>Appearance</h3>
    <p>Switch between Light and Dark mode.</p>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="themeToggle">
            <input type="checkbox" id="themeToggle" onclick="toggleTheme()" />
            <div class="slider round"></div>
        </label>
        <span id="themeLabel">Light Mode</span>
    </div>
</div>

            <!-- Change Password -->
            <div class="dashboard-card" style="max-width: 600px; margin-top: 20px;">
    <h3>Security</h3>
    <p>Update your password to keep your account secure.</p>
    
    <form id="changePasswordForm" onsubmit="changePassword(event)">
        <div class="field" style="margin-top: 15px; margin-right: 25px;">
            <label for="currentPassword">Current Password</label>
            <input type="password" id="currentPassword" placeholder="Enter current password" required>
        </div>
        <div class="field" style="margin-right: 25px;">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password" required>
        </div>
        <div class="field" style="margin-right: 25px;">
            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="primary-btn">Update Password</button>
    </form>
</div>

        </div>
    </main>

</div>

<script>
    // APPLY THEME AND SYNC TOGGLE ON LOAD
window.addEventListener('DOMContentLoaded', (event) => {
    const savedTheme = localStorage.getItem("theme");
    const themeToggle = document.getElementById("themeToggle");
    const themeLabel = document.getElementById("themeLabel");

    if (savedTheme === "dark") {
        document.documentElement.classList.add("dark-mode");
        document.body.classList.add("dark-mode");
        // Move the toggle button to the "on" position
        if (themeToggle) themeToggle.checked = true;
        if (themeLabel) themeLabel.textContent = "Dark Mode";
    } else {
        document.documentElement.classList.remove("dark-mode");
        document.body.classList.remove("dark-mode");
        // Move the toggle button to the "off" position
        if (themeToggle) themeToggle.checked = false;
        if (themeLabel) themeLabel.textContent = "Light Mode";
    }
});

function toggleTheme() {
    const isDark = document.getElementById("themeToggle").checked;
    const label = document.getElementById("themeLabel");
    
    if (isDark) {
        document.documentElement.classList.add("dark-mode");
        document.body.classList.add("dark-mode");
        localStorage.setItem("theme", "dark");
        label.textContent = "Dark Mode";
    } else {
        document.documentElement.classList.remove("dark-mode");
        document.body.classList.remove("dark-mode");
        localStorage.setItem("theme", "light");
        label.textContent = "Light Mode";
    }
}

// APPLY THEME ON LOAD
window.addEventListener('DOMContentLoaded', (event) => {
    const savedTheme = localStorage.getItem("theme");
    const toggle = document.getElementById("themeToggle");
    const label = document.getElementById("themeLabel");

    if (savedTheme === "dark") {
        document.body.classList.add("dark-mode");
        if(toggle) toggle.checked = true;
        if(label) label.textContent = "Dark Mode";
    }
});

// PASSWORD CHANGE LOGIC
function changePassword(event) {
    event.preventDefault();

    const currentPassword = document.getElementById("currentPassword").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
        alert("❌ New passwords do not match!");
        return;
    }

    // Send data to PHP
    fetch('update_password.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            current_pw: currentPassword,
            new_pw: newPassword
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === 'success') {
            alert("✅ Password updated successfully!");
            document.getElementById("changePasswordForm").reset();
        } else {
            alert("❌ Error: " + data.message);
        }
    })
    .catch(err => {
        console.error("Error:", err);
        alert("An error occurred while updating the password.");
    });
}

function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
  }
</script>

</body>
</html>
