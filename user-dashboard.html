<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | Time Tracker</title>
    <link rel="stylesheet" href="style.css"> 
    <script src="timer-logic.js"></script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                document.documentElement.classList.add("dark-mode");
                document.body.classList.add("dark-mode");
            }
        })();
    </script>
</head>
<body>

<div class="dashboard-page" style="display: flex; width: 100%; min-height: 100vh;">

    <aside class="dashboard-sidebar">
        <h2>⏱ Time Tracker</h2>
        <nav>
            <button class="nav-btn active" onclick="location.href='user-dashboard.html'">Dashboard</button>
            <button class="nav-btn" onclick="location.href='user-logs.html'">Time Logs</button>
            <button class="nav-btn" onclick="location.href='user-reports.html'">Reports</button>
            <button class="nav-btn" onclick="location.href='user-settings.html'">Settings</button>
        </nav>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main class="dashboard-main" style="flex: 1; padding: 20px;">
        <h1>Welcome Back, <span id="userDisplayName">...</span>!</h1>
        <p class="subtitle">Track your work time and stay productive.</p>
        
        <div class="dashboard-cards">
            <div class="dashboard-card">
                <h3>Real-Time Tracker</h3>
                <p>Track your active work session.</p>

                            <div style="margin: 15px 0;">
                <label for="taskSelect" style="display: block; margin-bottom: 5px; font-size: 0.9rem; opacity: 0.8;">Select Current Task:</label>
                <select id="taskSelect" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: #1a1a1a; color: white;">
                    <option value="">-- Choose a Task --</option>
                    <option value="1">Frontend Development</option>
                    <option value="2">Backend API Integration</option>
                    <option value="3">Database Optimization</option>
                    <option value="4">Bug Fixing & Debugging</option>
                    <option value="5">System Documentation</option>
                    <option value="6">UI/UX Design Refinement</option>
                    <option value="7">Unit Testing</option>
                </select>
            </div>

                <div id="timer" class="timer-display" style="font-size: 3rem; font-weight: bold; margin: 20px 0;">00:00:00</div>
                
                <div class="timer-actions">
                    <button id="startBtn" onclick="startTimer()" class="primary-btn">Start</button>
                    <button id="stopBtn" onclick="stopTimer()" class="secondary-btn" disabled>Stop</button>
                </div>
            </div>

            <div class="dashboard-card">
                <h3>Today's Summary</h3>
                <p>Total time tracked today:</p>
                <div id="total" class="timer-display" style="font-size: 3rem; font-weight: bold; margin: 20px 0;">00:00:00</div>
            </div>
        </div>
    </main>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        loadTasks(); 
        loadUserInfo(); 
    });

    function loadUserInfo() {
        fetch('get_user_info.php')
            .then(res => res.json())
            .then(data => {
                if (!data.error) {
                    document.getElementById('userDisplayName').textContent = data.username;
                }
            })
            .catch(err => console.error("Failed to fetch user data:", err));
    }

    function loadTasks() {
        fetch('get_tasks.php')
            .then(res => res.json())
            .then(tasks => {
                const select = document.getElementById("taskSelect");
                // Reset dropdown
                select.innerHTML = '<option value="">-- Choose a Task --</option>';
                
                tasks.forEach(task => {
                    let option = document.createElement("option");
                    option.value = task.task_id;
                    option.textContent = task.task_name;
                    select.appendChild(option);
                });
            })
            .catch(err => console.error("Error loading tasks:", err));
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = "index.html";
    }

    let startTime;
    let elapsedTime = 0;
    let timerInterval;

    function timeToString(time) {
        let diffInHrs = time / 3600000;
        let hh = Math.floor(diffInHrs);
        let diffInMin = (diffInHrs - hh) * 60;
        let mm = Math.floor(diffInMin);
        let diffInSec = (diffInMin - mm) * 60;
        let ss = Math.floor(diffInSec);
        return `${hh.toString().padStart(2, "0")}:${mm.toString().padStart(2, "0")}:${ss.toString().padStart(2, "0")}`;
    }

    function startTimer() {
        const taskId = document.getElementById("taskSelect").value;
        if (!taskId) {
            alert("Please select a task before starting!");
            return;
        }
        document.getElementById("startBtn").disabled = true;
        document.getElementById("stopBtn").disabled = false;
        document.getElementById("taskSelect").disabled = true;

        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(function printTime() {
            elapsedTime = Date.now() - startTime;
            document.getElementById("timer").innerHTML = timeToString(elapsedTime);
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        document.getElementById("startBtn").disabled = false;
        document.getElementById("stopBtn").disabled = true;
        document.getElementById("taskSelect").disabled = false;
    }
</script>
</body>
</html>
